<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge RAG Agent</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --text-muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --user-bg: #1e3a5f;
      --assistant-bg: #1e293b;
      --success: #22c55e;
      --warn: #f59e0b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.25rem 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; }
    header h1 span { color: var(--accent); font-weight: 500; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .session-badge {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .settings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      align-items: end;
      padding: 0.75rem 0;
      font-size: 0.8125rem;
    }

    .settings label { display: flex; flex-direction: column; gap: 0.25rem; color: var(--text-muted); }

    .settings input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.875rem;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      padding-bottom: 0.35rem;
    }

    .toggle-row input { width: auto; accent-color: var(--accent); }

    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 320px;
      max-height: calc(100vh - 260px);
      scroll-behavior: smooth;
    }

    .chat.waiting { opacity: 0.92; }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      padding: 2rem;
      gap: 0.5rem;
    }

    .chat-empty p { font-size: 0.9375rem; max-width: 420px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-role {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      padding: 0 0.25rem;
    }

    .msg.user .msg-role { text-align: right; }

    .msg-bubble {
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9375rem;
      cursor: default;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .msg.clickable .msg-bubble {
      cursor: pointer;
    }

    .msg.clickable .msg-bubble:hover {
      box-shadow: 0 0 0 1px var(--accent);
    }

    .msg.branch-point .msg-bubble {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #2a5080;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .msg-bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.typing .msg-bubble {
      color: var(--text-muted);
      font-style: italic;
      border-style: dashed;
    }

    .msg-actions {
      margin-top: 0.35rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .msg.user .msg-actions { justify-content: flex-end; }

    .msg-action {
      font-size: 0.6875rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.15rem 0.25rem;
      opacity: 0.85;
    }

    .msg-action:hover { opacity: 1; text-decoration: underline; }

    .msg-meta {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .tag {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .tag.ok { border-color: #166534; color: var(--success); }
    .tag.warn { border-color: #92400e; color: var(--warn); }
    .tag.rejected { border-color: #475569; color: var(--text-muted); }
    .tag.error { border-color: #7f1d1d; color: #fecaca; }

    .agent-steps {
      margin-bottom: 0.65rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .agent-step-line { line-height: 1.45; }
    .agent-step-line.running { color: var(--warn); }
    .agent-step-line.ok { color: var(--success); }
    .agent-step-line.fail { color: #fecaca; }

    .plan-thinking,
    .progress-text {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.45;
      margin: 0.15rem 0 0.35rem 0;
      white-space: pre-line;
      word-break: break-word;
    }

    .progress-waiting-line {
      display: block;
      margin-top: 0.15rem;
    }

    .progress-waiting-dots {
      display: inline-block;
      letter-spacing: 0.05em;
      animation: progressDotBlink 1s ease-in-out infinite;
    }

    @keyframes progressDotBlink {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }

    .msg-bubble.answer-only {
      min-height: 1.5rem;
    }

    .thinking-block {
      margin-bottom: 0.65rem;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    .thinking-block summary {
      cursor: pointer;
      padding: 0.4rem 0.6rem;
      color: var(--text-muted);
      -webkit-user-select: none;
      user-select: none;
    }

    .thinking-content {
      padding: 0.5rem 0.65rem;
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
      font-family: ui-monospace, monospace;
      color: var(--text-muted);
    }

    .answer-stream {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .stream-divider {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 0.5rem 0;
    }

    .msg a { color: var(--accent); text-decoration: none; }
    .msg a:hover { text-decoration: underline; }

    .charts {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-top: 0.5rem;
    }

    .chart-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      background: var(--surface);
    }

    .chart-card img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 6px;
      display: block;
    }

    .chart-card-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .chart-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }

    details.retrieval {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    details.retrieval summary { cursor: pointer; -webkit-user-select: none; user-select: none; }

    details.retrieval ul {
      margin-top: 0.35rem;
      padding-left: 1.1rem;
      max-height: 120px;
      overflow-y: auto;
    }

    .composer {
      position: sticky;
      bottom: 0;
      background: linear-gradient(transparent, var(--bg) 12%);
      padding: 1rem 0 1.25rem;
      border-top: 1px solid var(--border);
    }

    .composer-inner {
      display: flex;
      gap: 0.65rem;
      align-items: flex-end;
    }

    .composer textarea {
      flex: 1;
      min-height: 52px;
      max-height: 160px;
      resize: vertical;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.9375rem;
      font-family: inherit;
      line-height: 1.45;
    }

    .composer textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }

    .composer textarea::placeholder { color: var(--text-muted); }

    .hint-bar {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.35rem 0 0;
      min-height: 1.2rem;
    }

    .hint-bar strong { color: var(--accent); }

    .error-toast {
      background: #451a1a;
      border: 1px solid #7f1d1d;
      color: #fecaca;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      display: none;
    }

    .error-toast.show { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Knowledge <span>RAG</span> Agent</h1>
      <div class="header-actions">
        <span class="session-badge" id="sessionDisplay" title="当前会话 ID">会话: —</span>
        <button type="button" class="btn btn-ghost" id="newSession">新会话</button>
      </div>
    </header>

    <div class="settings">
      <label>
        API 地址
        <input type="text" id="base" value="http://127.0.0.1:8000" />
      </label>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div class="chat-wrap">
      <div class="chat" id="chat"></div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <textarea
          id="query"
          rows="2"
          placeholder="输入金融/研报/数据相关问题…（Enter 发送，Shift+Enter 换行）&#10;示例：某行业 AI 业绩突破？汇总 CSV 并画图？"
        ></textarea>
        <button type="button" class="btn btn-primary" id="send">发送</button>
      </div>
      <div class="hint-bar" id="hintBar"></div>
    </div>
  </div>

  <script>
    const STORAGE_SESSION = "rag_session_id";
    const STORAGE_BASE = "rag_api_base";
    const STORAGE_CHAT_PREFIX = "rag_chat_";

    /** @type {{ role: string, content: string, meta?: object }[]} */
    let chatHistory = [];
    let sessionId = localStorage.getItem(STORAGE_SESSION) || "";
    let pendingNewSession = false;
    let branchIndex = -1;
    let isLoading = false;

    const el = {
      base: document.getElementById("base"),
      query: document.getElementById("query"),
      send: document.getElementById("send"),
      chat: document.getElementById("chat"),
      sessionDisplay: document.getElementById("sessionDisplay"),
      newSession: document.getElementById("newSession"),
      errorToast: document.getElementById("errorToast"),
      hintBar: document.getElementById("hintBar"),
    };

    const savedBase = localStorage.getItem(STORAGE_BASE);
    if (savedBase) el.base.value = savedBase;

    function uuid() {
      return "xxxxxxxxxxxx4xxxyxxxxxxxxxxxxxxx".replace(/[xy]/g, (c) => {
        const r = (Math.random() * 16) | 0;
        const v = c === "x" ? r : (r & 0x3) | 0x8;
        return v.toString(16);
      });
    }

    function chatStorageKey() {
      return STORAGE_CHAT_PREFIX + (sessionId || "default");
    }

    function chatHistoryForStorage() {
      return chatHistory.map(({ role, content }) => ({ role, content }));
    }

    function saveChatToStorage() {
      if (!sessionId) return;
      try {
        localStorage.setItem(chatStorageKey(), JSON.stringify(chatHistoryForStorage()));
      } catch (_) { /* quota */ }
    }

    function loadChatFromStorage() {
      if (!sessionId) return;
      try {
        const raw = localStorage.getItem(chatStorageKey());
        if (raw) chatHistory = JSON.parse(raw);
      } catch (_) {
        chatHistory = [];
      }
    }

    function clearLocalSessionStorage(sid) {
      if (sid) {
        try {
          localStorage.removeItem(STORAGE_CHAT_PREFIX + sid);
        } catch (_) { /* ignore */ }
      }
      localStorage.removeItem(STORAGE_SESSION);
    }

    function destroySessionOnServer(sid, { keepalive = false } = {}) {
      if (!sid) return;
      const base = el.base.value.replace(/\/$/, "");
      const url = base + "/session/" + encodeURIComponent(sid);
      try {
        fetch(url, { method: "DELETE", keepalive: keepalive }).catch(() => {});
      } catch (_) { /* ignore */ }
    }

    function teardownSession(sid, { notifyServer = true, keepalive = false } = {}) {
      if (notifyServer) destroySessionOnServer(sid, { keepalive });
      clearLocalSessionStorage(sid);
    }

    function ensureSession() {
      if (!sessionId) {
        sessionId = uuid().slice(0, 16);
        localStorage.setItem(STORAGE_SESSION, sessionId);
      }
      el.sessionDisplay.textContent = "会话: " + sessionId.slice(0, 8) + "…";
      el.sessionDisplay.title = sessionId;
    }

    function showError(msg) {
      el.errorToast.textContent = msg;
      el.errorToast.classList.add("show");
      setTimeout(() => el.errorToast.classList.remove("show"), 6000);
    }

    function showHint(html) {
      el.hintBar.innerHTML = html;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderEmpty() {
      if (chatHistory.length || isLoading) return;
      el.chat.innerHTML = `
        <div class="chat-empty">
          <p>企业知识库联合检索 · 多轮对话</p>
          <p style="font-size:0.8125rem">点击历史消息可<strong style="color:var(--accent)">重新提问</strong>或<strong style="color:var(--accent)">从此追问</strong>，后续对话将被截断。</p>
        </div>`;
    }

    function renderRetrieval(meta) {
      const chunks = meta.knowledge_chunks || [];
      const hits = meta.meta_hits || [];
      if (!chunks.length && !hits.length) return "";
      let html = `<details class="retrieval"><summary>检索来源（${chunks.length} 文本 / ${hits.length} 元数据）</summary><ul>`;
      chunks.slice(0, 4).forEach((c) => {
        const text = (c.chunk && c.chunk.content) ? c.chunk.content.slice(0, 120) : "";
        const src = (c.chunk && c.chunk.source_file) || "";
        html += `<li>${escapeHtml(src)} — ${escapeHtml(text)}…</li>`;
      });
      hits.slice(0, 3).forEach((h) => {
        const name = (h.record && h.record.file_name) || "";
        html += `<li>📊 ${escapeHtml(name)}</li>`;
      });
      html += "</ul></details>";
      return html;
    }

    function chartFileName(path) {
      return String(path || "").replace(/\\/g, "/").split("/").pop() || "chart";
    }

    function chartServeUrl(path, sid) {
      const base = el.base.value.replace(/\/$/, "");
      const name = chartFileName(path);
      return base + "/session/" + encodeURIComponent(sid || sessionId) + "/files/" + encodeURIComponent(name);
    }

    function isImageChartPath(path) {
      const lower = String(path).toLowerCase();
      return lower.endsWith(".png") || lower.endsWith(".jpg") || lower.endsWith(".jpeg") || lower.endsWith(".webp") || lower.endsWith(".gif");
    }

    function renderChartsHtml(paths, sid) {
      if (!paths || !paths.length) return "";
      let html = '<div class="charts">';
      paths.forEach((p) => {
        const fname = chartFileName(p);
        const url = chartServeUrl(p, sid);
        const isImg = isImageChartPath(p);
        html += `<div class="chart-card"><div class="chart-card-title">${escapeHtml(fname)}</div>`;
        if (isImg) {
          html += `<img src="${escapeHtml(url)}" alt="${escapeHtml(fname)}" loading="lazy" />`;
        } else {
          html += `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(fname)}</a>`;
        }
        html += `<div class="chart-actions">`;
        html += `<button type="button" class="btn btn-sm btn-ghost chart-copy" data-url="${escapeHtml(url)}" data-image="${isImg ? "1" : "0"}">复制</button>`;
        html += `<button type="button" class="btn btn-sm btn-primary chart-download" data-url="${escapeHtml(url)}" data-fname="${escapeHtml(fname)}">下载</button>`;
        html += `</div></div>`;
      });
      html += "</div>";
      return html;
    }

    async function copyChartAsset(url, isImage) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("复制失败 " + res.status);
      const blob = await res.blob();
      if (isImage && navigator.clipboard && window.ClipboardItem) {
        await navigator.clipboard.write([new ClipboardItem({ [blob.type || "image/png"]: blob })]);
      } else {
        await navigator.clipboard.writeText(await blob.text());
      }
    }

    function bindChartActions(root) {
      if (!root) return;
      root.querySelectorAll(".chart-copy").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            await copyChartAsset(btn.dataset.url, btn.dataset.image === "1");
            showHint("已复制到剪贴板");
          } catch (err) {
            showError(err.message || "复制失败");
          }
        });
      });
      root.querySelectorAll(".chart-download").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            await downloadAsset(btn.dataset.url, btn.dataset.fname || "chart.png");
          } catch (err) {
            showError(err.message || "下载失败");
          }
        });
      });
    }

    async function downloadAsset(url, filename) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("下载失败 " + res.status);
      const blob = await res.blob();
      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = objectUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objectUrl);
    }

    function statusTagClass(status) {
      if (status === "ok") return "ok";
      if (status === "error") return "error";
      if (status === "rejected") return "rejected";
      return "warn";
    }

    function renderMessage(item, index) {
      const isUser = item.role === "user";
      const div = document.createElement("div");
      div.className = "msg " + (isUser ? "user" : "assistant");
      if (!isLoading) div.classList.add("clickable");
      if (index === branchIndex) div.classList.add("branch-point");
      div.dataset.index = String(index);

      let body = escapeHtml(item.content);
      let progressHtml = "";
      let chartsHtml = "";
      let metaHtml = "";

      if (!isUser && item.meta) {
        const m = item.meta;
        const progressText = normalizeProgressText(m.progress_text || m.planning_thought || "");
        if (progressText) {
          progressHtml = `<div class="progress-text">${escapeHtml(progressText)}</div>`;
        }
        if (m.charts && m.charts.length) {
          chartsHtml = renderChartsHtml(m.charts, m.session_id || sessionId);
        }
        metaHtml += `<span class="tag ${statusTagClass(m.status)}">${escapeHtml(m.status || "ok")}</span>`;
        if (m.retrieval) body += renderRetrieval(m.retrieval);
      }

      const actionLabel = isUser ? "重新提问" : "从此追问";
      const actionHint = isUser
        ? "截断此问题之后的历史，填入输入框"
        : "截断此回答之后的历史，可继续追问";

      div.innerHTML = `
        <div class="msg-role">${isUser ? "你" : "助手"}</div>
        ${progressHtml}
        <div class="msg-bubble answer-only" title="${escapeHtml(actionHint)}">${body}</div>
        ${chartsHtml}
        <div class="msg-actions">
          <button type="button" class="msg-action" data-action="${isUser ? "reask" : "branch"}" data-index="${index}">${actionLabel}</button>
        </div>
        ${metaHtml ? `<div class="msg-meta">${metaHtml}</div>` : ""}
      `;
      return div;
    }

    function normalizeProgressText(text) {
      if (!text) return "";
      return String(text)
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .join("\n");
    }

    function phaseLabel(phase) {
      const map = { planner: "规划", data_processor: "数据处理", reporter: "回答" };
      return map[phase] || phase || "Agent";
    }

    function createStreamingBubble() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "streamingBubble";
      div.innerHTML = `
        <div class="msg-role">助手</div>
        <div class="progress-text" id="streamProgress">
          <span id="streamProgressContent"></span>
          <span class="progress-waiting-line" id="streamProgressWaiting" style="display:none">
            <span id="streamProgressWaitingText"></span><span class="progress-waiting-dots">......</span>
          </span>
        </div>
        <div id="streamAnswerHost"></div>
        <div id="streamCharts"></div>`;
      return div;
    }

    function ensureStreamingBubble() {
      let bubble = document.getElementById("streamingBubble");
      if (!bubble) {
        bubble = createStreamingBubble();
        el.chat.appendChild(bubble);
        scrollChatToBottom();
      }
      return bubble;
    }

    function ensureAnswerBubble(streamState) {
      if (streamState.answerBubbleShown) {
        return document.getElementById("streamAnswer");
      }
      const host = document.getElementById("streamAnswerHost");
      const wrap = document.getElementById("streamingBubble");
      if (!host) return null;
      host.innerHTML =
        '<div class="msg-bubble answer-only"><div class="answer-stream" id="streamAnswer"></div></div>';
      streamState.answerBubbleShown = true;
      if (wrap) wrap.classList.add("typing");
      scrollChatToBottom();
      return document.getElementById("streamAnswer");
    }

    function endLlmConnecting(streamState) {
      if (!streamState.llmConnecting) return;
      streamState.llmConnecting = false;
      if (streamState.progressText === "正在连接大模型") {
        streamState.progressText = "";
      }
      updateProgressDisplay(streamState);
    }

    function updateProgressDisplay(streamState) {
      const contentEl = document.getElementById("streamProgressContent");
      const waitingEl = document.getElementById("streamProgressWaiting");
      const waitingTextEl = document.getElementById("streamProgressWaitingText");
      if (contentEl) contentEl.textContent = normalizeProgressText(streamState.progressText || "");
      if (waitingEl && waitingTextEl) {
        if (streamState.waitingActive && streamState.waitingText) {
          waitingEl.style.display = "block";
          waitingTextEl.textContent = streamState.waitingText.trim();
        } else {
          waitingEl.style.display = "none";
          waitingTextEl.textContent = "";
        }
      }
    }

    function appendProgressDelta(text, streamState) {
      if (!text) return;
      if (streamState.llmConnecting || streamState.progressText === "正在连接大模型") {
        streamState.llmConnecting = false;
        streamState.progressText = "";
      }
      streamState.progressText = (streamState.progressText || "") + text;
      updateProgressDisplay(streamState);
      scrollChatToBottom();
    }

    function appendProgressLine(text, streamState) {
      const line = String(text || "").trim();
      if (!line) return;
      endLlmConnecting(streamState);
      const prefix = streamState.progressText ? "\n" : "";
      streamState.progressText = (streamState.progressText || "") + prefix + line;
      updateProgressDisplay(streamState);
      scrollChatToBottom();
    }

    function setProgressWaiting(text, active, streamState) {
      if (active) {
        streamState.waitingActive = true;
        streamState.waitingText = String(text || "").trim();
      } else {
        if (streamState.waitingActive && streamState.waitingText) {
          appendProgressLine(streamState.waitingText, streamState);
        }
        streamState.waitingActive = false;
        streamState.waitingText = "";
      }
      updateProgressDisplay(streamState);
      scrollChatToBottom();
    }

    function renderStreamCharts(paths) {
      const wrap = document.getElementById("streamCharts");
      if (!wrap || !paths || !paths.length) return;
      wrap.innerHTML = renderChartsHtml(paths, sessionId);
      bindChartActions(wrap);
    }

    function appendAnswerDelta(text, streamState) {
      const chunk = String(text || "");
      if (!chunk) return;
      endLlmConnecting(streamState);
      const answerEl = ensureAnswerBubble(streamState);
      if (!answerEl) return;
      streamState.answer = (streamState.answer || "") + chunk;
      answerEl.textContent = streamState.answer;
      scrollChatToBottom();
    }

    function handleStreamEvent(ev, streamState) {
      ensureStreamingBubble();
      switch (ev.type) {
        case "node_start":
          break;
        case "planning_start":
          streamState.planningThought = "";
          break;
        case "planning_delta":
        case "progress_delta":
          appendProgressDelta(ev.text || "", streamState);
          if (ev.type === "planning_delta") {
            streamState.planningThought = (streamState.planningThought || "") + (ev.text || "");
          }
          break;
        case "planning_end":
          if (ev.planning_thought) {
            streamState.planningThought = ev.planning_thought;
            if (!streamState.progressText) {
              streamState.progressText = ev.planning_thought;
              updateProgressDisplay(streamState);
            }
          }
          break;
        case "progress_line":
          appendProgressLine(ev.text || "", streamState);
          break;
        case "progress_waiting":
          setProgressWaiting(ev.text || "", ev.active !== false, streamState);
          break;
        case "retrieval_status":
          setProgressWaiting(ev.label || ("正在检索 " + (ev.query || "")), true, streamState);
          break;
        case "thinking_start":
        case "thinking_delta":
        case "thinking_end":
          break;
        case "tool_start":
          if (ev.label) setProgressWaiting(ev.label.replace(/…$/, ""), true, streamState);
          break;
        case "tool_end":
          setProgressWaiting("", false, streamState);
          if (ev.label) appendProgressLine((ev.ok ? "✓ " : "✗ ") + ev.label, streamState);
          break;
        case "answer_start":
          endLlmConnecting(streamState);
          break;
        case "answer_delta":
          appendAnswerDelta(ev.text || "", streamState);
          break;
        case "answer_end": {
          endLlmConnecting(streamState);
          const finalText = ev.text || streamState.answer || "";
          if (finalText) {
            const answerEl = ensureAnswerBubble(streamState);
            streamState.answer = finalText;
            if (answerEl) answerEl.textContent = streamState.answer;
          }
          setProgressWaiting("", false, streamState);
          break;
        }
        default:
          break;
      }
    }

    function parseSSEChunk(buffer) {
      const events = [];
      const blocks = buffer.split("\n\n");
      const rest = blocks.pop() || "";
      for (const block of blocks) {
        const line = block.trim();
        if (line.startsWith("data:")) {
          try {
            events.push(JSON.parse(line.slice(5).trim()));
          } catch (_) { /* skip */ }
        }
      }
      return { events, rest };
    }

    async function consumeSSE(res, streamState) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let donePayload = null;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parsed = parseSSEChunk(buffer);
        buffer = parsed.rest;
        for (const ev of parsed.events) {
          if (ev.type === "done") donePayload = ev;
          else if (ev.type === "error") throw new Error(ev.message || "Agent 错误");
          else handleStreamEvent(ev, streamState);
        }
      }
      if (buffer.trim()) {
        const parsed = parseSSEChunk(buffer + "\n\n");
        for (const ev of parsed.events) {
          if (ev.type === "done") donePayload = ev;
          else if (ev.type === "error") throw new Error(ev.message || "Agent 错误");
          else handleStreamEvent(ev, streamState);
        }
      }
      return donePayload;
    }

    function renderTypingIndicator() {
      return createStreamingBubble();
    }

    function scrollChatToBottom() {
      requestAnimationFrame(() => {
        el.chat.scrollTop = el.chat.scrollHeight;
      });
    }

    function renderChat() {
      el.chat.innerHTML = "";
      el.chat.classList.toggle("waiting", isLoading);

      if (!chatHistory.length && !isLoading) {
        renderEmpty();
        return;
      }

      chatHistory.forEach((item, i) => {
        el.chat.appendChild(renderMessage(item, i));
      });

      if (isLoading) {
        if (!document.getElementById("streamingBubble")) {
          el.chat.appendChild(renderTypingIndicator());
        }
      }

      el.chat.querySelectorAll(".msg-action").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.index, 10);
          if (btn.dataset.action === "reask") branchFromUserMessage(idx);
          else branchFromAssistantMessage(idx);
        });
      });

      el.chat.querySelectorAll(".msg.clickable .msg-bubble").forEach((bubble) => {
        bubble.addEventListener("click", () => {
          const msg = bubble.closest(".msg");
          const idx = parseInt(msg.dataset.index, 10);
          const isUser = msg.classList.contains("user");
          if (isUser) branchFromUserMessage(idx);
          else branchFromAssistantMessage(idx);
        });
      });

      bindChartActions(el.chat);

      scrollChatToBottom();
    }

    function branchFromUserMessage(index) {
      if (isLoading) return;
      const item = chatHistory[index];
      if (!item || item.role !== "user") return;
      chatHistory = chatHistory.slice(0, index);
      branchIndex = index;
      el.query.value = item.content;
      saveChatToStorage();
      renderChat();
      showHint(`已回溯到第 <strong>${index + 1}</strong> 条问题之前，问题已填入输入框，可编辑后发送。`);
      el.query.focus();
    }

    function branchFromAssistantMessage(index) {
      if (isLoading) return;
      const item = chatHistory[index];
      if (!item || item.role !== "assistant") return;
      chatHistory = chatHistory.slice(0, index + 1);
      branchIndex = index;
      el.query.value = "";
      saveChatToStorage();
      renderChat();
      showHint(`已保留到此回答（含），后续对话已清除。请在下方输入<strong>追问</strong>。`);
      el.query.focus();
    }

    function setLoading(on) {
      isLoading = on;
      el.send.disabled = on;
      if (!on) {
        const bubble = document.getElementById("streamingBubble");
        if (bubble) bubble.remove();
      }
      renderChat();
    }

    async function sendMessage() {
      const query = el.query.value.trim();
      if (!query || isLoading) return;

      localStorage.setItem(STORAGE_BASE, el.base.value);
      ensureSession();

      const base = el.base.value.replace(/\/$/, "");
      const path = "/search/stream";

      const historyPayload = chatHistory.map(({ role, content }) => ({ role, content }));

      chatHistory.push({ role: "user", content: query });
      branchIndex = -1;
      saveChatToStorage();
      el.query.value = "";
      showHint("");
      setLoading(true);

      const streamState = {
        answer: "",
        progressText: "",
        planningThought: "",
        waitingActive: false,
        waitingText: "",
        llmConnecting: true,
        answerBubbleShown: false,
      };

      ensureStreamingBubble();
      streamState.progressText = "正在连接大模型";
      updateProgressDisplay(streamState);

      try {
        const res = await fetch(base + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            session_id: sessionId,
            chat_history: historyPayload,
            new_session: pendingNewSession,
          }),
        });

        if (!res.ok) {
          let detail = res.statusText;
          try {
            const errJson = await res.json();
            detail = errJson.detail || detail;
          } catch (_) { /* not json */ }
          throw new Error(detail || "请求失败");
        }

        ensureStreamingBubble();
        const data = await consumeSSE(res, streamState);
        if (!data) throw new Error("未收到完成事件");

        if (data.session_id) {
          sessionId = data.session_id;
          pendingNewSession = false;
          localStorage.setItem(STORAGE_SESSION, sessionId);
          el.sessionDisplay.textContent = "会话: " + sessionId.slice(0, 8) + "…";
          el.sessionDisplay.title = sessionId;
        }

        endLlmConnecting(streamState);
        const answerText = streamState.answer || data.answer || data.message || "（无内容）";
        if (answerText && !streamState.answerBubbleShown) {
          const answerEl = ensureAnswerBubble(streamState);
          streamState.answer = answerText;
          if (answerEl) answerEl.textContent = answerText;
        }
        renderStreamCharts(data.chart_artifacts || []);

        setProgressWaiting("", false, streamState);

        chatHistory.push({
          role: "assistant",
          content: answerText,
          meta: {
            status: data.status,
            session_id: sessionId,
            charts: data.chart_artifacts || [],
            retrieval: {
              knowledge_chunks: data.knowledge_chunks,
              meta_hits: data.meta_hits,
            },
            progress_text: normalizeProgressText(streamState.progressText || streamState.planningThought || ""),
            planning_thought: normalizeProgressText(streamState.planningThought || ""),
          },
        });
        saveChatToStorage();
      } catch (err) {
        console.error("[RAG] request failed:", err);
        const errMsg = err.message || String(err);
        chatHistory.push({
          role: "assistant",
          content:
            "请求未成功：" +
            errMsg +
            "。连接可能已中断（Agent 仍可能在后台运行）。请稍后重试或查看后端日志。",
          meta: { status: "error" },
        });
        saveChatToStorage();
        showError(errMsg);
      } finally {
        setLoading(false);
        el.query.focus();
      }
    }

    el.send.addEventListener("click", sendMessage);

    el.query.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    el.newSession.addEventListener("click", () => {
      const oldSession = sessionId;
      teardownSession(oldSession, { notifyServer: true });
      sessionId = uuid().slice(0, 16);
      pendingNewSession = true;
      localStorage.setItem(STORAGE_SESSION, sessionId);
      chatHistory = [];
      branchIndex = -1;
      ensureSession();
      saveChatToStorage();
      renderChat();
      showHint("");
      el.query.focus();
    });

    window.addEventListener("pagehide", (ev) => {
      if (ev.persisted) return;
      const sid = sessionId;
      if (!sid) return;
      teardownSession(sid, { notifyServer: true, keepalive: true });
      sessionId = "";
      chatHistory = [];
    });

    ensureSession();
    loadChatFromStorage();
    renderChat();
    el.query.focus();
  </script>
</body>
</html>
